name: Build & Release Trading Co-Pilot

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  release:
    types: [created]

jobs:
  # ── Build Chrome Extension ─────────────────────────────────────────────
  build-extension:
    name: Build Chrome Extension
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check
        continue-on-error: true

      - name: Build extension
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: trading-copilot-extension-${{ github.sha }}
          path: extension/dist/
          retention-days: 30

      - name: Zip extension for release
        if: github.event_name == 'release'
        run: |
          cd dist
          zip -r ../trading-copilot-extension.zip .
          echo "Extension zipped ✓"

      - name: Upload to release
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: extension/trading-copilot-extension.zip
          asset_name: trading-copilot-extension.zip
          asset_content_type: application/zip

  # ── Backend Checks ─────────────────────────────────────────────────────
  check-backend:
    name: Check Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: node --check src/server.js && node --check src/supabase.js

  # ── Deploy Backend to Railway/Render ──────────────────────────────────
  deploy-backend:
    name: Deploy Backend
    needs: [check-backend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Uncomment your preferred deploy target:

      # --- Railway ---
      # - name: Deploy to Railway
      #   uses: bervProject/railway-deploy@v1.0.0
